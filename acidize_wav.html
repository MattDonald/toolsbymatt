<style>
  #acidize { display: flex; flex-direction: column; align-items: center; }
  #acidize #dropZone { border: 2px dashed #FC6F2F; padding: 70px; text-align: center; width: 100%; box-sizing: border-box; cursor: pointer; transition: border-color 0s, background 0s; }
  #acidize #dropZone.loaded { padding: 12px 20px; cursor: pointer; }
  #acidize h2, #acidize #bpmRow .bpm-label, #acidize #bpmRow .slash { color: rgba(252, 111, 47, 1); font-family: custom_175773; font-style: normal; text-align: center; font-size: 50px; font-weight: 500; line-height: 50px; margin: 40px 0; }
  #acidize h2.loaded { font-size: 18px; margin: 0; line-height: 25px; }
  #acidize #bottomArea { margin-top: -50px; text-align: center; }
  #acidize #bpmRow { display: none; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; color: #FC6F2F; }
  #acidize #bpmRow input[type="number"], #acidize #bpmRow select { background: transparent; border: none; color: rgba(252, 111, 47, 1); font-family: custom_175773; font-style: normal; font-size: 50px; font-weight: 500; width: auto; min-width: 60px; outline: none; text-align: right; -moz-appearance: textfield; appearance: textfield; }
  #acidize #bpmRow input[type="number"]::-webkit-outer-spin-button, #acidize #bpmRow input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  #acidize #bpmRow input[type="number"]::placeholder { color: rgba(252, 111, 47, 0.5); }
  #acidize #bpmRow select { width: 80px; cursor: pointer; }
  #acidize #bpmLine, #acidize #timeSigLine { display: flex; align-items: center; justify-content: center; gap: 8px; }
  #acidize #bpmLine { position: relative; left: -20px; }
  #acidize #acidizeBtn { display: none; margin-top: -10px; background: #FC6F2F; color: #FFEBD2; border: 1px solid #FC6F2F; border-radius: 100px; padding: 9px 28px 12px 28px; font-family: custom_175773; font-weight: 500; font-size: 18px; cursor: pointer; line-height: 1; }
  #acidize #acidizeBtn:hover { background: #FFEBD2; color: #FC6F2F; }
  #acidize #acidizeStatus { color: rgba(252, 111, 47, 1); font-family: JetBrains Mono; font-style: italic; text-align: center; font-size: 12px; font-weight: 400; line-height: 20px; font-variation-settings: 'wght' 600; margin-top: 12px; }
  @media screen and (max-width: 320px) {
    #acidize #bpmRow .bpm-label, #acidize #bpmRow .slash { margin: 0; }
    #acidize #bpmLine { margin: 30px 0; }
    #acidize #timeSigLine { margin: -30px 0 30px 0; }
  }
</style>

<div id="acidize">

  <div id="dropZone">
    <input type="file" id="fileInput" accept=".wav,audio/wav" style="display:none">
    <h2>add a .wav to acidize</h2>
  </div>

  <h2 id="fileNameDisplay" style="display:none;"></h2>

  <div id="bottomArea">
    <div id="bpmRow">
      <div id="bpmLine">
        <input type="number" id="bpm" min="20" max="300" step="0.01" placeholder="123">
        <span class="bpm-label">bpm</span>
      </div>
      <div id="timeSigLine">
        <select id="numerator">
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
        </select>
        <span class="slash">/</span>
        <select id="denominator">
          <option value="2">2</option>
          <option value="4" selected>4</option>
          <option value="8">8</option>
          <option value="16">16</option>
        </select>
      </div>
    </div>

    <button id="acidizeBtn">acidize</button>
  </div>

  <div id="acidizeStatus"></div>

</div>

<script>
  (function() {
    let selectedFile = null;

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const bpmRow = document.getElementById('bpmRow');
    const acidizeBtn = document.getElementById('acidizeBtn');
    const status = document.getElementById('acidizeStatus');

    const bpmInput = document.getElementById('bpm');
    bpmInput.addEventListener('input', () => {
      bpmInput.style.width = ((bpmInput.value.length || bpmInput.placeholder.length) + 1) + 'ch';
    });
    bpmInput.style.width = (bpmInput.placeholder.length + 1) + 'ch';

    dropZone.addEventListener('click', () => document.getElementById('fileInput').click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('hover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      if (!file.name.toLowerCase().endsWith('.wav')) {
        status.textContent = 'wav files only.';
        return;
      }
      selectedFile = file;
      dropZone.classList.add('loaded');
      dropZone.innerHTML = '<input type="file" id="fileInput" accept=".wav,audio/wav" style="display:none"><h2 class="loaded">add another .wav to acidize</h2>';
      document.getElementById('fileInput').addEventListener('change', e => {
        if (e.target.files[0]) handleFile(e.target.files[0]);
      });
      document.getElementById('fileNameDisplay').textContent = 'file: ' + file.name;
      document.getElementById('fileNameDisplay').style.display = 'block';
      bpmRow.style.display = 'flex';
      acidizeBtn.style.display = 'inline-block';
      status.textContent = '';
    }

    acidizeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      const bpm = parseFloat(document.getElementById('bpm').value);
      const numerator = parseInt(document.getElementById('numerator').value);
      const denominator = parseInt(document.getElementById('denominator').value);

      if (!bpm || bpm < 20 || bpm > 300) {
        status.textContent = 'please enter a valid bpm between 20 and 300.';
        return;
      }

      status.textContent = 'processing...';

      try {
        const arrayBuffer = await selectedFile.arrayBuffer();
        const wav = new Uint8Array(arrayBuffer);

        const header = new TextDecoder('ascii').decode(wav.slice(0, 200));
        if (header.includes('acid')) {
          status.textContent = 'this file already contains acid metadata.';
          return;
        }

        const fmtPos = findChunk(wav, 'fmt ');
        if (fmtPos === -1) {
          status.textContent = 'could not find fmt chunk. is this a valid wav file?';
          return;
        }

        const fmtSize = readUInt32LE(wav, fmtPos + 4);
        const dataPos = fmtPos + 8 + fmtSize;

        const acidChunk = new Uint8Array(32);
        const view = new DataView(acidChunk.buffer);
        acidChunk.set([0x61, 0x63, 0x69, 0x64], 0);
        view.setUint32(4, 24, true);
        view.setUint32(8, 0x01, true);
        view.setUint16(12, 48, true);
        view.setUint16(14, 0x8000, true);
        view.setFloat32(16, 0, true);
        view.setUint32(20, 0, true);
        view.setUint16(24, denominator, true);
        view.setUint16(26, numerator, true);
        view.setFloat32(28, bpm, true);

        const before = wav.slice(0, dataPos);
        const after = wav.slice(dataPos);
        const newWav = new Uint8Array(before.length + acidChunk.length + after.length);
        newWav.set(before, 0);
        newWav.set(acidChunk, before.length);
        newWav.set(after, before.length + acidChunk.length);

        const riffView = new DataView(newWav.buffer);
        riffView.setUint32(4, newWav.length - 8, true);

        const newDataPos = dataPos + 32;
        const dataSize = newWav.length - newDataPos - 8;
        riffView.setUint32(newDataPos + 4, dataSize, true);

        const blob = new Blob([newWav], { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = selectedFile.name.replace(/\.wav$/i, '') + '_' + bpm + 'bpm.wav';
        a.click();
        URL.revokeObjectURL(url);

        status.textContent = '';

      } catch (err) {
        status.textContent = 'error: ' + err.message;
      }
    });

    function findChunk(wav, id) {
      const idBytes = id.split('').map(c => c.charCodeAt(0));
      for (let i = 12; i < wav.length - 8; i++) {
        if (wav[i] === idBytes[0] && wav[i+1] === idBytes[1] &&
            wav[i+2] === idBytes[2] && wav[i+3] === idBytes[3]) {
          return i;
        }
      }
      return -1;
    }

    function readUInt32LE(buf, offset) {
      return buf[offset] | (buf[offset+1] << 8) | (buf[offset+2] << 16) | (buf[offset+3] << 24);
    }
  })();
</script>
