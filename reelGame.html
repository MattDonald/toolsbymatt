<script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>

<style>
    #reelGame { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; outline: none; text-transform: lowercase; user-select: none; overscroll-behavior: none; touch-action: none; } 
    #reelGame h2 { color: rgba(252, 111, 47, 1); font-family: custom_175773; font-style: normal; text-align: center; font-size: 50px; font-weight: 500; line-height: 50px; }
    #reelGame p { color: rgba(252, 111, 47, 1); font-family: JetBrains Mono; font-style: italic; text-align: center; font-size: 12px; font-weight: 400; line-height: 20px; font-variation-settings: 'wght' 600; }
    #reelGame #timer { width: 180px; height: 2px; background: rgba(252, 111, 47, 0.2); margin: 12px auto; border-radius: 2px; overflow: hidden; }
    #reelGame #timer-fill { width: 100%; height: 100%; background: rgba(252, 111, 47, 1); transition: background 0.3s; }
    #reelGame dotlottie-player { width: 350px; height: 350px; cursor: pointer; }
    #reelGame .ui-layer { margin-top: 10px; }
    #reelGame #sync-btn { background: #FC6F2F; color: #FFEBD2; border: 1px solid #FC6F2F; border-radius: 100px; padding: 9px 28px 12px 28px; font-family: custom_175773; font-weight: 500; font-size: 18px; cursor: pointer; line-height: 1; }
    #reelGame #sync-btn:hover { background: #FFEBD2; color: #FC6F2F; border: 1px solid #FC6F2F; }
    #reelGame #sync-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    @keyframes fast-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    #reelGame .warning { color: white !important; background: rgba(252, 111, 47, 1); padding: 0 4px; animation: fast-blink 0.2s infinite; }
    .action-word::before { content: "click"; } 
    @media (hover: none) and (pointer: coarse) { .action-word::before { content: "tap"; } }
</style>

<div id="reelGame" tabindex="0">
    <div id="msg">
        <h2 id="main-headline">can *you* sync it?</h2>
        <p class="instruction-text" id="sub-instruction"><span class="action-word"></span> the reel to play</p>
        <div id="timer"><div id="timer-fill"></div></div>
    </div>
    
    <dotlottie-player id="tp7-player" src="https://cdn.jsdelivr.net/gh/mattdonald/toolsbymatt@main/tp7_reel.lottie" background="transparent" loop></dotlottie-player>

    <div class="ui-layer">
        <button id="sync-btn">use tp7_speed_sync</button>
    </div>
</div>

<script>
    // --- GLOBAL CONFIGURATION ---
    const BASE_TEMPO = 120;       // Native BPM of the audio file
    const LOOP_BARS = 2;          // Length of the loop in bars
    const BEATS_PER_BAR = 4;      // Time signature denominator (usually 4 for 4/4 time)
    // ----------------------------
    
    const baseTickInterval = 60 / BASE_TEMPO; 
    const totalBeats = LOOP_BARS * BEATS_PER_BAR;

    let audioCtx, drumBuffer, loopSource, masterGain;
    let targetRate = 1.0; 
    let currentRate = 0.8 + (Math.random() * 0.4);
    
    let isActive = false;
    let isSynced = false;
    let engineClosed = false;
    let stopping = false;
    let timeLeft = 10.0;
    const maxTime = 10.0;
    let timerInterval;

    let currentLoopPhase = 0;
    let lastTime = 0;
    let nextTickTime = 0;

    const player = document.getElementById('tp7-player');
    const headline = document.getElementById('main-headline');
    const subInstruction = document.getElementById('sub-instruction');
    const timerFill = document.getElementById('timer-fill');
    const syncBtn = document.getElementById('sync-btn');
    const container = document.getElementById('reelGame');

    async function startEngine() {
        if (isActive || engineClosed) return;
        container.focus();
        subInstruction.innerHTML = "loading audio...";

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);

        try {
            // Replace this URL when you swap the audio
            const res = await fetch('https://cdn.jsdelivr.net/gh/mattdonald/toolsbymatt@main/120_ASH_TOM_LOOP_A.wav');
            const arrayBuffer = await res.arrayBuffer();
            drumBuffer = await audioCtx.decodeAudioData(arrayBuffer);

            createSource();
            
            let now = audioCtx.currentTime;
            nextTickTime = now + 0.1; 
            lastTime = now;
            
            scheduleMetronome();
            requestAnimationFrame(updatePhase);

            player.play();
            isActive = true;
            subInstruction.innerHTML = "scroll up & down for pitch";
            startTimer();
        } catch (e) { 
            subInstruction.innerHTML = "error loading audio.";
        }
    }

    function createSource() {
        if (loopSource) try { loopSource.stop(); } catch(e){}
        loopSource = audioCtx.createBufferSource();
        loopSource.buffer = drumBuffer;
        loopSource.loop = true;
        loopSource.playbackRate.value = currentRate;
        loopSource.connect(masterGain);
        loopSource.start(0);
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = maxTime;
        timerInterval = setInterval(() => {
            if (isSynced || stopping) { clearInterval(timerInterval); return; }
            timeLeft -= 0.1;
            timerFill.style.width = (timeLeft / maxTime * 100) + "%";
            
            if (timeLeft < 3) {
                subInstruction.classList.add('warning');
                subInstruction.innerHTML = "speed change coming!";
            } else {
                subInstruction.classList.remove('warning');
                const diff = Math.abs(currentRate - targetRate);
                
                if (diff < 0.005) { headline.innerText = "in sync"; }
                else if (diff < 0.03) { headline.innerText = "getting close"; } 
                else { headline.innerText = "scroll to sync"; }
                
                subInstruction.innerHTML = "up + down to change pitch";
            }

            if (timeLeft <= 0) triggerDrift();
        }, 100);
    }

    function triggerDrift() {
        targetRate = 0.8 + (Math.random() * 0.5);
        let driftOffset = (Math.random() > 0.5 ? 0.15 : -0.15) + (Math.random() * 0.1);
        currentRate = targetRate + driftOffset;
        currentRate = Math.min(Math.max(currentRate, 0.5), 1.5);
        
        loopSource.playbackRate.setTargetAtTime(currentRate, audioCtx.currentTime, 0.2);
        player.setSpeed(currentRate);
        timeLeft = maxTime;
    }

    function performSync() {
        if (!isActive || isSynced) return;
        isSynced = true; 
        clearInterval(timerInterval);
        syncBtn.disabled = true;
        subInstruction.classList.remove('warning');

        let now = audioCtx.currentTime;
        
        // Dynamically calculate the snap points based on total beats
        let portionDuration = drumBuffer.duration / totalBeats; 
        let nearestPortion = Math.round(currentLoopPhase / portionDuration) % totalBeats;
        
        let currentTickInterval = baseTickInterval / targetRate;
        let timeSinceLastClick = now - (nextTickTime - currentTickInterval);
        
        let snappedOffset = ((nearestPortion * portionDuration) + (timeSinceLastClick * targetRate)) % drumBuffer.duration;

        loopSource.stop();
        loopSource = audioCtx.createBufferSource();
        loopSource.buffer = drumBuffer;
        loopSource.loop = true;
        loopSource.playbackRate.value = targetRate; 
        loopSource.connect(masterGain);
        loopSource.start(now, snappedOffset);

        player.setSpeed(targetRate);
        player.seek((snappedOffset / drumBuffer.duration) * 100);

        headline.innerText = "in sync + on grid";
        subInstruction.innerHTML = "scroll to explore tools by matt";
        timerFill.style.background = "rgba(252, 111, 47, 1);";
    }

    function tapeStopEngine() {
        if (engineClosed || !isActive || stopping) return;
        stopping = true;
        const stopDuration = 1.5; 
        const now = audioCtx.currentTime;
        
        loopSource.playbackRate.setValueAtTime(loopSource.playbackRate.value, now);
        loopSource.playbackRate.exponentialRampToValueAtTime(0.01, now + stopDuration);
        
        player.setSpeed(0.1); 
        setTimeout(() => player.pause(), stopDuration * 1000);
        
        subInstruction.innerHTML = "session ended";
        timerFill.style.background = "rgba(252, 111, 47, 0.2)";

        setTimeout(() => {
            if (loopSource) try { loopSource.stop(); } catch(e){}
            if (audioCtx) audioCtx.close();
            engineClosed = true;
            isActive = false;
        }, (stopDuration + 0.1) * 1000);
    }

    container.addEventListener('wheel', (e) => {
        if (engineClosed || stopping || !isActive) return;
        if (isSynced) { tapeStopEngine(); return; }
        
        e.preventDefault();
        e.stopPropagation(); 
        
        currentRate += e.deltaY * -0.0007;
        currentRate = Math.min(Math.max(currentRate, 0.5), 1.5);
        loopSource.playbackRate.value = currentRate;
        player.setSpeed(currentRate);
    }, { passive: false });

    let lastTouchY = 0;
    container.addEventListener('touchstart', (e) => {
        if (!isActive || engineClosed || stopping) return;
        lastTouchY = e.touches[0].clientY;
    }, { passive: true });

    container.addEventListener('touchmove', (e) => {
        if (!isActive || engineClosed || stopping) return;
        if (isSynced) { tapeStopEngine(); return; }
        
        if (e.cancelable) e.preventDefault();
        e.stopPropagation(); 
        
        const currentTouchY = e.touches[0].clientY;
        currentRate += (lastTouchY - currentTouchY) * 0.002;
        currentRate = Math.min(Math.max(currentRate, 0.5), 1.5);
        loopSource.playbackRate.value = currentRate;
        player.setSpeed(currentRate);
        lastTouchY = currentTouchY;
    }, { passive: false });

    function scheduleMetronome() {
        if (engineClosed || stopping) return;
        let now = audioCtx.currentTime;
        
        let currentTickInterval = baseTickInterval / targetRate; 

        while (nextTickTime < now + 0.1) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(masterGain);
            osc.frequency.value = 1000;
            g.gain.setValueAtTime(0.4, nextTickTime); 
            g.gain.exponentialRampToValueAtTime(0.0001, nextTickTime + 0.05);
            osc.start(nextTickTime); osc.stop(nextTickTime + 0.05);
            
            nextTickTime += currentTickInterval; 
        }
        setTimeout(scheduleMetronome, 50);
    }

    function updatePhase() {
        if (isActive && !isSynced) {
            let now = audioCtx.currentTime;
            currentLoopPhase += (now - lastTime) * currentRate;
            currentLoopPhase %= drumBuffer.duration;
            lastTime = now;
        }
        if (!engineClosed) requestAnimationFrame(updatePhase);
    }

    syncBtn.addEventListener('click', (e) => { 
        e.stopPropagation(); 
        if (!isActive) startEngine();
        else performSync(); 
    });
    player.addEventListener('click', startEngine);
</script>
