function updateButtonState() {
  if (isSynced || stopping) return;
  if (!isActive) {
    syncBtn.innerHTML = '<span class="action-word"></span> the reel to play';
    syncBtn.classList.remove('clickable', 'warning');
    return;
  }
  if (timeLeft < 3) {
    syncBtn.innerHTML = "tempo change coming";
    syncBtn.classList.add('warning');
    syncBtn.classList.remove('clickable');
  } else {
    syncBtn.classList.remove('warning');
    const diff = Math.abs(currentRate - targetRate);
    if (diff < 0.005) {
      syncBtn.innerHTML = "in sync";
      if (driftCount > 0) syncBtn.classList.add('clickable');
      else syncBtn.classList.remove('clickable');
    } else if (driftCount === 0) {
      syncBtn.innerHTML = "scroll up + down to pitch";
      syncBtn.classList.remove('clickable');
    } else {
      syncBtn.innerHTML = "use tp7_speed_sync";
      syncBtn.classList.add('clickable');
    }
  }
}

async function startEngine() {
  if (isActive || engineClosed) return;
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  syncBtn.innerHTML = "loading...";
  try {
    // Pinned to a specific jsDelivr tag — avoids @main CDN cache lag
    const res = await fetch('https://cdn.jsdelivr.net/gh/mattdonald/toolsbymatt@v1.0/120_ASH_TOM_LOOP_A.wav');
    const arrayBuffer = await res.arrayBuffer();
    drumBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    masterGain = audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
    createSource();
    let now = audioCtx.currentTime;
    nextTickTime = now + 0.1;
    lastTime = now;
    scheduleMetronome();
    requestAnimationFrame(updatePhase);
    player.play();
    player.setSpeed(currentRate);
    isActive = true;
    updateButtonState();
    startTimer();
    container.focus();
  } catch (e) {
    syncBtn.innerHTML = "audio error";
    console.error(e);
  }
}

function createSource() {
  if (loopSource) try { loopSource.stop(); } catch(e){}
  loopSource = audioCtx.createBufferSource();
  loopSource.buffer = drumBuffer;
  loopSource.loop = true;
  loopSource.playbackRate.value = currentRate;
  loopSource.connect(masterGain);
  loopSource.start(0);
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = maxTime;
  timerInterval = setInterval(() => {
    if (isSynced || stopping) { clearInterval(timerInterval); return; }
    timeLeft -= 0.1;
    const offset = CIRCLE_CIRCUMFERENCE - (timeLeft / maxTime) * CIRCLE_CIRCUMFERENCE;
    timerPath.style.strokeDashoffset = offset;
    updateButtonState();
    if (timeLeft <= 0) triggerDrift();
  }, 100);
}

function triggerDrift() {
  isSynced = false;
  targetRate = 0.8 + (Math.random() * 0.5);
  let driftOffset = (Math.random() > 0.5 ? 0.15 : -0.15) + (Math.random() * 0.05);
  currentRate = targetRate + driftOffset;
  currentRate = Math.min(Math.max(currentRate, 0.5), 1.5);
  loopSource.playbackRate.setTargetAtTime(currentRate, audioCtx.currentTime, 0.2);
  player.setSpeed(currentRate);
  driftCount++;
  timeLeft = maxTime;
  updateButtonState();
}

function performSync() {
  if (!isActive || isSynced) return;
  isSynced = true;
  currentRate = targetRate;
  clearInterval(timerInterval);
  syncBtn.classList.remove('warning', 'clickable');
  timerPath.style.stroke = "rgba(252, 111, 47, 0.2)";
  let now = audioCtx.currentTime;
  let portionDuration = drumBuffer.duration / totalBeats;
  let nearestPortion = Math.round(currentLoopPhase / portionDuration) % totalBeats;
  let currentTickInterval = baseTickInterval / targetRate;
  let timeSinceLastClick = Math.max(0, now - (nextTickTime - currentTickInterval));
  let snappedOffset = ((nearestPortion * portionDuration) + (timeSinceLastClick * targetRate)) % drumBuffer.duration;
  loopSource.stop();
  loopSource = audioCtx.createBufferSource();
  loopSource.buffer = drumBuffer;
  loopSource.loop = true;
  loopSource.playbackRate.value = targetRate;
  loopSource.connect(masterGain);
  loopSource.start(now, snappedOffset);
  currentRate = targetRate;
  player.setSpeed(targetRate);
  playerSeek((snappedOffset / drumBuffer.duration) * 100);
  syncBtn.innerHTML = "in sync + on grid";
}

function tapeStopEngine() {
  if (engineClosed || !isActive || stopping) return;
  stopping = true;
  isSynced = false;
  const stopDuration = 1.5;
  const now = audioCtx.currentTime;
  loopSource.playbackRate.setValueAtTime(loopSource.playbackRate.value, now);
  loopSource.playbackRate.exponentialRampToValueAtTime(0.01, now + stopDuration);
  player.setSpeed(0.1);
  setTimeout(() => player.pause(), stopDuration * 1000);
  syncBtn.innerHTML = "stopped";
  timerPath.style.opacity = "0";
  setTimeout(() => {
    if (loopSource) try { loopSource.stop(); } catch(e){}
    if (audioCtx) audioCtx.close();
    engineClosed = true;
    isActive = false;
  }, (stopDuration + 0.1) * 1000);
}

container.addEventListener('wheel', (e) => {
  if (e.target.closest('#sync-btn')) return;
  if (engineClosed || stopping || !isActive) return;
  if (isSynced) { tapeStopEngine(); return; }
  e.preventDefault();
  e.stopPropagation();
  currentRate += e.deltaY * -0.0007;
  currentRate = Math.min(Math.max(currentRate, 0.5), 1.5);
  loopSource.playbackRate.value = currentRate;
  player.setSpeed(currentRate);
  updateButtonState();
}, { passive: false });

let lastTouchY = 0;

container.addEventListener('touchstart', (e) => {
  if (e.target.closest('#sync-btn')) return;
  if (!isActive || engineClosed || stopping) return;
  lastTouchY = e.touches[0].clientY;
}, { passive: true });

container.addEventListener('touchmove', (e) => {
  if (e.target.closest('#sync-btn')) return;
  if (!isActive || engineClosed || stopping) return;
  if (isSynced) { tapeStopEngine(); return; }
  if (e.cancelable) e.preventDefault();
  e.stopPropagation();
  const currentTouchY = e.touches[0].clientY;
  currentRate += (lastTouchY - currentTouchY) * 0.002;
  currentRate = Math.min(Math.max(currentRate, 0.5), 1.5);
  loopSource.playbackRate.value = currentRate;
  player.setSpeed(currentRate);
  lastTouchY = currentTouchY;
  updateButtonState();
}, { passive: false });

function scheduleMetronome() {
  if (engineClosed || stopping) return;
  let now = audioCtx.currentTime;
  let currentTickInterval = baseTickInterval / targetRate;
  while (nextTickTime < now + 0.1) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(masterGain);
    osc.frequency.value = 1000;
    g.gain.setValueAtTime(0.4, nextTickTime);
    g.gain.exponentialRampToValueAtTime(0.0001, nextTickTime + 0.05);
    osc.start(nextTickTime); osc.stop(nextTickTime + 0.05);
    nextTickTime += currentTickInterval;
  }
  setTimeout(scheduleMetronome, 50);
}

function updatePhase() {
  if (isActive && !isSynced) {
    let now = audioCtx.currentTime;
    currentLoopPhase += (now - lastTime) * currentRate;
    currentLoopPhase %= drumBuffer.duration;
    lastTime = now;
  }
  if (!engineClosed) requestAnimationFrame(updatePhase);
}

syncBtn.addEventListener('pointerdown', (e) => {
  e.stopPropagation();
  if (!isActive) {
    startEngine();
  } else if (syncBtn.classList.contains('clickable')) {
    performSync();
  }
});

document.getElementById('tp7-player').addEventListener('click', (e) => {
  if (!isActive) startEngine();
});

</script>
